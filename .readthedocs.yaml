# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
version: 2

build:
  os: ubuntu-lts-latest
  tools:
    python: "3.13"
  apt_packages:
    - pandoc
  jobs:
    post_build:
      # Build a single-file HTML version into a temp dir (Pandoc reads this, not your raw .rst)
      - python -m sphinx -b singlehtml docs/ /tmp/singlehtml
      # Convert it to ODT and drop it where Read the Docs will publish it
      - pandoc /tmp/singlehtml/index.html
          --resource-path=/tmp/singlehtml
          -o $READTHEDOCS_OUTPUT/html/django-cms-user-guide.odt

sphinx:
  configuration: user-guide/source/conf.py
  fail_on_warning: false

formats:
  - epub
  - pdf

python:
  install:
    - requirements: user-guide/requirements.txt
